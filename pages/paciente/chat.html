<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CarePlus – Chat</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet"/>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <link href="../../CSS/paciente/chat.css" rel="stylesheet"/>
  <script src="../../JavaScript/auth/auth-guard.js"></script>
</head>
<body>

<div class="bg-hero" aria-hidden="true"></div>

<div class="shell">

  <header>
    <div class="logo-wrap">
      <img src="../../assets/images/Frame 1321317519.png" alt="Logo CarePlus" class="main-logo"/>
    </div>
    <div class="header-title">CHAT</div>
  </header>

  <div class="body-row">

    <aside class="nav-sidebar" id="navSidebar">
      <button class="sidebar-toggle" id="sidebarToggle" aria-expanded="false">
        <i class="bi bi-list"></i>
      </button>
      <a class="nav-item" href="../../index.html"><i class="bi bi-house-fill"></i><span class="nav-label">Início</span></a>
      <a class="nav-item" href="../../pages/paciente/area-paciente.html"><i class="bi bi-person-fill"></i><span class="nav-label">Paciente</span></a>
      <a class="nav-item" onclick="irParaTelemedicina('telemedicina')"><i class="bi bi-plus-circle-fill"></i><span class="nav-label">Pronto Atend.</span></a>
      <a class="nav-item" onclick="abrirAgendamentoHub('abrirAgendamento')"><i class="bi bi-telephone-fill"></i><span class="nav-label">Agendar</span></a>
      <a class="nav-item" href="../../pages/paciente/care-points.html"><i class="bi bi-trophy-fill"></i><span class="nav-label">Care Points</span></a>
      <a class="nav-item" href="../auth/login.html" onclick="localStorage.removeItem('logado'); localStorage.removeItem('nome');" title="Sair" style="margin-top:auto;">
        <i class="bi bi-box-arrow-left"></i><span class="nav-label">Sair</span>
      </a>
    </aside>

    <div class="chat-wrap">

      <div class="contacts" id="contactsList">
        <div class="contacts-title">Conversas</div>
        <ul class="contacts-list" id="contactsUl">
          <!-- Contacts will be dynamically added here -->
        </ul>
      </div>

      <div class="chat-panel" id="chatPanel">
        <div class="empty-chat" id="emptyState">
          <i class="bi bi-chat-dots"></i>
          <p>Selecione uma conversa para começar</p>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="../../JavaScript/paciente/chat.js"></script>
</body>
</html>
